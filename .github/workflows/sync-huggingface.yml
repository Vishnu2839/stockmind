name: Sync Backend to Hugging Face Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          mkdir /tmp/hf_space
          cp -a backend/. /tmp/hf_space/
          cd /tmp/hf_space
          git init
          git config user.email "bot@stockmind.ai"
          git config user.name "StockMind Bot"
          git add .
          git commit -m "Auto-sync from GitHub"
          # Push forcefully to overwrite the Hugging Face space with the latest backend code
          git push -f https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main
